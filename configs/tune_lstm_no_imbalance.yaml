# Hyperparameter grid for the plain-BCE / no-imbalance-handling arm.
# This is the variant the paper selects as the baseline LSTM, so tuning
# (lr, dropout) directly on it — instead of on the cost-sensitive arm
# (configs/tune_lstm.yaml) — eliminates the methodological wrinkle that
# the paper's chosen hyperparameters were originally optimised for a
# different loss configuration.
base_config: configs/lstm_no_imbalance.yaml
sweep_name: lstm_no_imbalance_lr_dropout_v1
out_root: models/tuning
seed: 42
grid:
  lr: [0.0003, 0.001, 0.003]
  dropout: [0.3, 0.5]
