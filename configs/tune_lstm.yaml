# Small focused hyperparameter sweep for the baseline LSTM. The (lr=1e-3,
# dropout=0.3) cell doubles as a fair re-run baseline (same code revision,
# same seed, same data ordering) — compare other trials against that row,
# not against models/lstm/metrics.json.
base_config: configs/lstm.yaml
sweep_name: lstm_lr_dropout_v1
out_root: models/tuning
seed: 42
grid:
  lr: [0.0003, 0.001, 0.003]
  dropout: [0.3, 0.5]
